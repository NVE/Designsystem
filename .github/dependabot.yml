version: 2
updates:
  - package-ecosystem: 'pnpm'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

    versioning-strategy: increase

    commit-message:
      prefix: 'chore'
      include: 'scope'

    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - '*'
      version-updates:
        applies-to: version-updates
        patterns:
          - '*'

    labels:
      - 'dependencies'

    reviewers:
      - 'gruble'
      - 'amish1188'
      - 'NVEJoel'
      - 'tomapedersen'

    ignore:
      - dependency-name: 'style-dictionary'
        versions: ['*']
